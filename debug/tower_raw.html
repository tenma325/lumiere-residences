<!DOCTYPE html>
<html><head><style>body{margin:0;overflow:hidden;background:#000}</style></head>
<body>
<script type="module">
import * as THREE from '/node_modules/three/build/three.module.js';
import { GLTFLoader } from '/node_modules/three/examples/jsm/loaders/GLTFLoader.js';
const scene = new THREE.Scene();
scene.background = new THREE.Color('#070710');
scene.fog = new THREE.FogExp2('#070710', 0.006);
const camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.5, 600);
camera.position.set(0,21,32); camera.lookAt(0,19.5,0);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0x7b8cb8, 0.85));
scene.add(new THREE.HemisphereLight(0x5a6a9a, 0x1a1a24, 0.85));
const dl=new THREE.DirectionalLight(0xffd9a0,2.4); dl.position.set(18,22,38); scene.add(dl);
const rim=new THREE.DirectionalLight(0xaab8de,1.8); rim.position.set(-28,42,-24); scene.add(rim);
new GLTFLoader().load('/models/tower.glb', (gltf)=>{
  const root = gltf.scene;
  root.rotation.y = Math.PI;
  root.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=true; }});
  // mimic TowerModel material edits
  root.traverse(o=>{
    if(o.isMesh){
      const mats = Array.isArray(o.material)?o.material:[o.material];
      mats.forEach(sm=>{
        if(sm.name==='glass' && sm.color){
          if(!sm.userData.g) sm.userData.g = {metal:sm.metalness, rough:sm.roughness, color:sm.color.clone()};
        }
      });
    }
  });
  scene.add(root);
  const box = new THREE.Box3().setFromObject(root);
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  const info = document.createElement('div');
  info.style='position:fixed;top:10px;left:10px;color:#fff;font:12px monospace;z-index:10;white-space:pre;background:rgba(0,0,0,0.5);padding:8px';
  info.textContent = `center: ${center.x.toFixed(1)},${center.y.toFixed(1)},${center.z.toFixed(1)}\nsize: ${size.x.toFixed(1)},${size.y.toFixed(1)},${size.z.toFixed(1)}`;
  document.body.appendChild(info);
  animate();
});
function animate(){requestAnimationFrame(animate); renderer.render(scene,camera);}
</script>
</body></html>
