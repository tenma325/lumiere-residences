<!DOCTYPE html>
<html>
<head>
<script type="importmap">
  {"imports": {"three": "./node_modules/three/build/three.module.js"}}
</script>
<style>body{margin:0;overflow:hidden;background:#000}#info{position:fixed;top:0;left:0;color:#fff;font:12px monospace;z-index:10;white-space:pre}</style>
</head>
<body>
<div id="info">loading...</div>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './node_modules/three/examples/jsm/loaders/GLTFLoader.js';
const scene = new THREE.Scene();
scene.background = new THREE.Color('#070710');
const cam = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.5, 600);
cam.position.set(0,21,32);
cam.lookAt(0,20,0);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(20,40,30);
scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const grid = new THREE.GridHelper(200, 40, 0xff0000, 0x333333);
grid.position.y = 0;
scene.add(grid);
const axes = new THREE.AxesHelper(10);
scene.add(axes);
const box = new THREE.Mesh(new THREE.BoxGeometry(2,2,2), new THREE.MeshStandardMaterial({color:0xff0000}));
box.position.set(0,20,0);
scene.add(box);
new GLTFLoader().load('/models/tower.glb', (gltf)=>{
  const info=[];
  const root = gltf.scene;
  root.rotation.y = Math.PI;
  scene.add(root);
  const box = new THREE.Box3().setFromObject(root);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  info.push(`bbox center:${center.x.toFixed(2)},${center.y.toFixed(2)},${center.z.toFixed(2)} size:${size.x.toFixed(2)},${size.y.toFixed(2)},${size.z.toFixed(2)}`);
  let meshCount=0, matNames=[];
  root.traverse(o=>{
    if(o.isMesh){meshCount++; matNames.push((o.material.name||'unnamed') + (Array.isArray(o.material)?'(multi)':''));}
  });
  info.push(`meshes:${meshCount}`);
  info.push('materials: ' + [...new Set(matNames)].join(', '));
  document.getElementById('info').textContent = info.join('\n');
}, undefined, e=>{
  document.getElementById('info').textContent = 'ERROR: '+e.message;
});
function animate(){requestAnimationFrame(animate); renderer.render(scene,cam);}
animate();
</script>
</body>
</html>
